aid: bmw
name: BMW
description: BMW is a German multinational company specializing in manufacturing luxury
  vehicles and motorcycles. BMW provides automotive data APIs through the Aftersales
  Online System (AOS) portal and the BMW Open Data Platform, enabling dealers, repair
  shops, and developers to access vehicle identification, maintenance, technical campaign,
  pricing, and diagnostic data.
type: Index
