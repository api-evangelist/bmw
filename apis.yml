apis:
  - aid: bmw:vehicle-identification-api
    name: BMW Vehicle Identification API
    tags: []
    humanURL: 
      https://aos-portal.bmwgroup.com/basic/ui/#/detail/vehicle-identification
    properties:
      - url: >-
          https://aos-portal.bmwgroup.com/basic/ui/#/detail/vehicle-identification
        type: Documentation
    description: >-
      The BMW Vehicle Identification API is a software tool that allows users to access
      detailed information about BMW vehicles by inputting their unique vehicle identification
      number (VIN). This API provides users with essential data about a vehicle's
      make, model, year, trim level, engine size, transmission type, and more.
  - aid: bmw:repair-and-maintenance-api
    name: BMW Repair and Maintenance API
    tags: []
    humanURL: 
      https://aos-portal.bmwgroup.com/basic/ui/#/detail/repair-maintenance
    properties:
      - url: 
          https://aos-portal.bmwgroup.com/basic/ui/#/detail/repair-maintenance
        type: Documentation
    description: >-
      The BMW Repair and Maintenance API is a comprehensive platform developed by
      BMW to provide access to a wide range of information and tools needed for servicing
      and maintaining BMW vehicles. This API allows automotive technicians and repair
      shops to access detailed maintenance schedules, diagnostic information, and
      technical specifications for BMW vehicles.
  - aid: bmw:technical-campaign-and-map-status-api
    name: BMW Technical Campaign and Map Status API
    tags: []
    humanURL: >-
      https://aos-portal.bmwgroup.com/basic/ui/#/detail/technical-campaign-map-status
    properties:
      - url: >-
          https://aos-portal.bmwgroup.com/basic/ui/#/detail/technical-campaign-map-status
        type: Documentation
    description: >-
      The BMW Technical Campaign and Map Status API is a powerful tool designed to
      assist users in keeping track of technical campaigns and updates related to
      BMW vehicles. This API provides real-time data on the status of technical campaigns,
      allowing users to view information such as the current progress, completion
      timelines, and any related announcements.
  - aid: bmw:flat-rates-api
    name: BMW Flat Rates API
    tags: []
    humanURL: https://aos-portal.bmwgroup.com/basic/ui/#/detail/flatrate
    properties:
      - url: https://aos-portal.bmwgroup.com/basic/ui/#/detail/flatrate
        type: Documentation
    description: >-
      The BMW Flat Rates API is a tool provided by BMW that allows users to access
      a database of fixed prices for specific services and repairs on BMW vehicles.
      This API provides users with transparent and standardized pricing information,
      allowing customers to easily compare costs for different services and make informed
      decisions about their vehicle maintenance.
  - aid: bmw:smart-maintenance-api
    name: BMW Smart Maintenance API
    tags: []
    humanURL: 
      https://aos-portal.bmwgroup.com/basic/ui/#/detail/smart-Maintenance
    properties:
      - url: https://aos-portal.bmwgroup.com/basic/ui/#/detail/smart-Maintenance
        type: Documentation
    description: >-
      The BMW Smart Maintenance API is a tool developed by BMW that utilizes advanced
      vehicle diagnostic technology to provide real-time information about the health
      and maintenance needs of a BMW vehicle. By connecting to the vehicle's onboard
      computer system, the API can monitor various aspects such as engine performance,
      tire pressure, and overall vehicle condition.
  - aid: bmw:bmw-open-data-platform
    name: BMW Open Data Platform
    tags: []
    humanURL: >-
      https://bmw-cardata.bmwgroup.com/thirdparty/public/repair-and-maintenance/technical-configuration/api-documentation
    properties:
      - url: >-
          https://bmw-cardata.bmwgroup.com/thirdparty/public/repair-and-maintenance/technical-configuration/api-documentation
        type: Documentation
    description: >-
      The BMW Open Data Platform is a digital initiative that provides developers,
      researchers, and innovators with access to a wide range of data related to BMW
      vehicles and mobility services. This platform allows users to access and analyze
      real-time vehicle data, including performance metrics, sensor data, and diagnostic
      information, in order to develop new applications, services, and technologies
      that can enhance the driving experience and improve overall vehicle performance.
